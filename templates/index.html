<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SocraticAI</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.2.0/styles/atom-one-dark.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.2.0/highlight.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
        
        <style>
            :root {
                --bg-color: #050505;
                --panel-bg: rgba(20, 20, 20, 0.85);
                --border-color: #2a2a2a;
                --text-main: #f3f3f3;
                --text-muted: #a0a0a0;
                
                --orange-primary: #ff6b1a; 
                --orange-secondary: #ff8533;
                --orange-glow: rgba(255, 107, 26, 0.4);
            }

            body {
                font-family: 'Inter', sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                margin: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden; /* Prevent body scroll, let chat-history scroll */
            }

            /* Ambient background */
            body::after {
                content: "";
                position: fixed;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
                background: radial-gradient(circle at 80% 0%, rgba(255, 107, 26, 0.12) 0%, transparent 40%),
                            radial-gradient(circle at 20% 100%, rgba(255, 107, 26, 0.08) 0%, transparent 50%);
                z-index: -1;
                pointer-events: none;
            }

            #chat-container {
                width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            h1 {
                font-family: 'Outfit', sans-serif;
                font-weight: 800;
                text-align: center;
                color: #fff;
                margin: 0;
                padding: 1.2rem 0;
                letter-spacing: 1px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                background: var(--bg-color);
                border-bottom: 1px solid var(--border-color);
                flex-shrink: 0;
            }

            h1 span {
                color: var(--orange-primary);
            }

            h1 .glow-dot {
                width: 12px;
                height: 12px;
                background-color: var(--orange-primary);
                border-radius: 50%;
                box-shadow: 0 0 15px var(--orange-primary);
                display: inline-block;
            }

            #chat-history {
                flex-grow: 1;
                overflow-y: auto;
                padding: 2rem 5%;
                background: transparent;
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
                scroll-behavior: smooth;
            }

            /* Custom Scrollbar */
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--orange-primary); }

            /* Chat Bubbles Layout */
            .message-wrapper {
                display: flex;
                width: 100%;
                max-width: 1300px;
                margin: 0 auto;
                animation: fadeInUp 0.4s ease forwards;
            }

            .message-content {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 0.55rem;
                max-width: 80%;
            }

            .user-wrapper {
                justify-content: flex-end;
            }

            .ai-wrapper {
                justify-content: flex-start;
            }

            .system-wrapper {
                justify-content: center;
            }

            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .message-bubble {
                width: fit-content;
                max-width: 100%;
                padding: 0.9rem 1.4rem;
                border-radius: 12px;
                font-size: 1.05rem;
                line-height: 1.7;
                position: relative;
            }

            .user-bubble {
                background: rgba(255, 107, 26, 0.08);
                color: var(--text-main);
                border-left: 4px solid var(--orange-primary);
            }

            .ai-bubble {
                background: transparent;
                color: var(--text-main);
            }

            .message-sender {
                font-family: 'Outfit', sans-serif;
                font-size: 0.85rem;
                font-weight: 700;
                margin-bottom: 0.5rem;
                text-transform: uppercase;
                letter-spacing: 1.5px;
            }

            .user-bubble .message-sender {
                color: var(--orange-primary);
            }
            .ai-bubble .message-sender {
                color: #fff;
            }

            .copy-msg-btn {
                position: relative;
                margin-left: auto;
                background: rgba(255,255,255,0.08);
                border: 1px solid rgba(255,255,255,0.15);
                color: #fff;
                border-radius: 10px;
                width: 32px;
                height: 32px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 0.95rem;
                transition: opacity 0.2s ease, transform 0.2s ease;
            }
            .copy-msg-btn:hover {
                opacity: 1;
                transform: translateY(-1px);
                background: rgba(255,255,255,0.16);
            }
            .message-content .copy-msg-btn {
                opacity: 1;
                visibility: visible;
            }
            .message-wrapper.user-wrapper .copy-msg-btn {
                opacity: 0;
                visibility: hidden;
            }
            .message-wrapper.user-wrapper:hover .copy-msg-btn {
                opacity: 1;
                visibility: visible;
            }

            /* Persona specific accents */
            .socrates-bubble { border-left: 4px solid #ff4757; }
            .system-bubble { 
                background: rgba(0,0,0,0.3);
                border: 1px dashed #555; 
                color: var(--text-muted);
                font-style: italic;
                font-size: 0.9rem;
                margin: 0 auto;
                text-align: center;
                border-radius: 8px;
                max-width: 600px;
                padding: 1rem;
            }

            /* Markdown Styling */
            .markdown p:last-child { margin-bottom: 0; }
            .markdown p { margin-bottom: 0.8rem; }
            
            .markdown pre { 
                margin: 1rem 0; 
                border-radius: 8px; 
                background: #0d0d0d !important;
                border: 1px solid #333;
            }
            .markdown code {
                font-family: 'Consolas', 'Courier New', monospace;
                font-size: 0.9rem;
            }
            .user-bubble .markdown code {
                background: rgba(0,0,0,0.3);
                color: var(--text-main);
                padding: 2px 5px;
                border-radius: 4px;
            }

            /* Code copy button */
            .hljs { position: relative; padding: 2.5rem 1rem 1rem; }
            .hljs::before {
                content: "Code";
                position: absolute;
                top: 0; left: 0;
                width: 100%;
                background: #1a1a1a;
                color: #888;
                padding: 4px 12px;
                font-family: 'Inter', sans-serif;
                font-size: 0.75rem;
                border-top-left-radius: 8px;
                border-top-right-radius: 8px;
                pointer-events: none;
            }
            .copy-code-btn {
                position: absolute;
                top: 4px;
                right: 8px;
                background-color: transparent;
                color: #a0a0a0;
                border: none;
                padding: 4px 10px;
                font-size: 0.75rem;
                font-family: 'Inter', sans-serif;
                cursor: pointer;
                transition: all 0.2s ease;
                z-index: 10;
            }
            .copy-code-btn:hover { color: #fff; }

            /* Loading indicator */
            .loading-indicator {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 1rem;
            }

            .loading-dots {
                display: flex;
                gap: 0.4rem;
                align-items: center;
            }

            .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--orange-primary);
                animation: pulse 1.4s infinite;
            }

            .dot:nth-child(2) {
                animation-delay: 0.2s;
            }

            .dot:nth-child(3) {
                animation-delay: 0.4s;
            }

            @keyframes pulse {
                0%, 100% { opacity: 0.4; }
                50% { opacity: 1; }
            }

            /* Input area container */
            .input-container {
                width: 100%;
                padding: 1.5rem 5%;
                display: flex;
                justify-content: center;
                flex-shrink: 0;
            }

            .input-group {
                width: 100%;
                max-width: 1300px;
                background: var(--panel-bg);
                border-radius: 20px;
                border: 1px solid #444;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                display: flex;
                align-items: stretch;
                overflow: hidden;
            }

            #user-input {
                background: transparent;
                border: none;
                color: var(--text-main);
                padding: 1.2rem;
                resize: inline;
                font-size: 1.05rem;
                box-shadow: none;
            }
            #user-input:focus {
                outline: none;
                box-shadow: none;
            }
            #user-input::placeholder {
                color: #666;
            }

            .send-btn-container {
                display: flex;
                align-items: center;
                padding: 0 1rem;
            }

            #send-btn {
                background: var(--orange-primary);
                border: none;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s ease;
                color: #000;
            }

            #send-btn:hover {
                background: var(--orange-secondary);
                box-shadow: 0 0 15px var(--orange-glow);
                transform: scale(1.05);
            }

            /* SVG for send icon */
            #send-btn svg {
                width: 18px;
                height: 18px;
                fill: currentColor;
                margin-left: 2px;
            }

        </style>
    </head>
    <body>
        <div id="chat-container">
            <h1><div class="glow-dot"></div> Socratic<span>AI</span></h1>
            <div id="chat-history"></div>
            
            <div class="input-container">
                <div class="input-group">
                    <textarea id="user-input" class="form-control" placeholder="Type your message..." rows="1"></textarea>
                    <div class="send-btn-container">
                        <button id="send-btn" title="Send (Enter)">
                            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <script>
            let requestInProgress = false;
            const md = window.markdownit({
                breaks: true,
                highlight: function (str, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            const highlighted = hljs.highlightBlock(str, { language: lang });
                            return `<pre class="hljs language-${lang}"><code>${highlighted.value}</code><button class="copy-code-btn" data-clipboard-text="${md.utils.escapeHtml(str)}">Copy</button></pre>`;
                        } catch (__) {}
                    }
                    return `<pre class="hljs"><code>${md.utils.escapeHtml(str)}</code><button class="copy-code-btn" data-clipboard-text="${md.utils.escapeHtml(str)}">Copy</button></pre>`;
                }
            });

            $(document).ready(function() {
                setInterval(obtainActiveMessage, 2000);
                hljs.highlightAll();
                
                $(document).on('click', '.copy-code-btn', function() {
                    var codeText = $(this).attr('data-clipboard-text') || $(this).siblings('code').text();
                    var copyTextarea = document.createElement('textarea');
                    copyTextarea.innerHTML = codeText; // unescape html for copying
                    var rawText = copyTextarea.textContent; // get clean text
                    
                    var tempNode = document.createElement('textarea');
                    tempNode.textContent = rawText;
                    document.body.appendChild(tempNode);
                    tempNode.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempNode);
                    
                    var btn = $(this);
                    btn.text('Copied!');
                    setTimeout(function() { btn.text('Copy'); }, 2000);
                });

                $(document).on('click', '.copy-msg-btn', function() {
                    var copyText = $(this).attr('data-clipboard-text') || '';
                    var tempNode = document.createElement('textarea');
                    tempNode.textContent = copyText;
                    document.body.appendChild(tempNode);
                    tempNode.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempNode);

                    var btn = $(this);
                    btn.text('✔');
                    setTimeout(function() { btn.text('📋'); }, 1200);
                });

                $('#send-btn').on('click', function() {
                    if (requestInProgress) return;
                    let user_input = $('#user-input').val();
                    if (user_input.trim() !== '') {
                        requestInProgress = true;
                        $('#send-btn').prop('disabled', true);
                        $('#user-input').prop('disabled', true);

                        $('#user-input').val('');
                        addChatMessage('tony', user_input);
                        $.post('/chat', { user_input: user_input }, function(data) {
                            var msg_count = data.length;
                            if (msg_count > 0) {
                                for (var i = 0; i < msg_count; i++) {
                                    if (data[i].response) {
                                        addChatMessage(data[i].role, data[i].response);
                                    }
                                }
                            }
                        }, 'json')
                        .always(function() {
                            requestInProgress = false;
                            $('#send-btn').prop('disabled', false);
                            $('#user-input').prop('disabled', false).focus();
                        });
                    }
                });

                // Support sending messages with Enter (and Shift+Enter for newline)
                $('#user-input').on('keydown', function(e) {
                    if (e.which === 13 && !e.shiftKey) {
                        e.preventDefault();
                        $('#send-btn').click();
                    }
                });
            });

            function escapeHtmlAttr(text) {
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function addChatMessage(sender, message) {
                let formattedMessage = md.render(message).trim();
                let chat_history = $('#chat-history');
                
                let isUser = sender.toLowerCase() === 'tony' || sender.toLowerCase() === 'user';
                let isSystem = sender.toLowerCase() === 'system';
                
                let displayName = sender.charAt(0).toUpperCase() + sender.slice(1);
                if(sender.toLowerCase() === 'tony') displayName = 'You';

                let bubbleClass = isUser ? 'message-bubble user-bubble' : `message-bubble ai-bubble ${sender}-bubble`;
                let wrapperClass = isUser ? 'message-wrapper user-wrapper' : 'message-wrapper ai-wrapper';
                
                if (isSystem) {
                    bubbleClass = 'message-bubble system-bubble';
                    wrapperClass = 'message-wrapper system-wrapper';
                }

                let copyButton = '';
                if (!isSystem) {
                    copyButton = `<button class="copy-msg-btn" type="button" data-clipboard-text="${escapeHtmlAttr(message)}">📋</button>`;
                }
                
                let html = `
                    <div class="${wrapperClass}">
                        <div class="message-content">
                            <div class="${bubbleClass}">
                                <div class="message-sender">${displayName}</div>
                                <div class="markdown">${formattedMessage}</div>
                            </div>
                            ${copyButton}
                        </div>
                    </div>
                `;
                
                chat_history.append(html);
                chat_history.scrollTop(chat_history[0].scrollHeight);
                
                chat_history.find('pre code').each(function(i, block) {
                    if(!$(block).hasClass('hljs')) {
                        hljs.highlightBlock(block);
                    }
                });
            } 

            function obtainActiveMessage() {
                if (!requestInProgress) {
                    requestInProgress = true;
                    $.getJSON('/active-message', function (data) {
                        var msg_count = data.length;
                        if (msg_count > 0) {
                            for (var i = 0; i < msg_count; i++) {
                                if (data[i].response) {
                                    addChatMessage(data[i].role, data[i].response);
                                }
                            }
                        }
                    }).always(function() {
                        requestInProgress = false;
                    });
                }
            }
        </script>
    </body>
</html>
